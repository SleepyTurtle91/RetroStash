name: RetroStash Android CI

on:
  push:
    branches: [ "main" ]
    # Add this tags section so the CI knows to trigger when you push a version tag!
    tags:
      - 'v*' 
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    # We need to give the Action permission to create releases
    permissions:
      contents: write 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      # This uploads to the Action Summary page (what you just did)
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RetroStash-Debug-APK
          path: app/build/outputs/apk/debug/*.apk

      # NEW: This automatically creates a GitHub Release and uploads the APK!
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        # ONLY run this step if the commit has a tag starting with 'v' (like v1.1.0)
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/debug/*.apk
          generate_release_notes: true
